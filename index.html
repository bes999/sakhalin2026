function showPage(id,el){
  document.getElementById('river-detail').classList.remove('show');
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('show');});
  document.querySelectorAll('.bnav').forEach(function(b){b.classList.remove('active');});
  document.getElementById('p-'+id).classList.add('show');
  var bn=document.getElementById('bn-'+id);
  if(bn)bn.classList.add('active');
  else if(el)el.classList.add('active');
  render(id);
}
function render(id){
  if(id==='route')rRoute();
  else if(id==='rivers')rRivers();
  else if(id==='menu')rMenu();
  else if(id==='shop')rShop();
  else if(id==='recipes')rRecipes();
  else if(id==='bar')rBar();
  else if(id==='catch')rCatch();
  else if(id==='gear')rGear();
  else if(id==='safety')rSafety();
}
function toggle(c){c.classList.toggle('open');}
function esc(s){return s.replace(/'/g,"\\'");}

function rShop(){
  var el=document.getElementById('p-shop');

  var html='<div class="shop-header"><div class="people-row"><span class="people-label">Количество человек</span><div class="people-ctrl"><button class="people-btn" onclick="chP(-1)">&#8722;</button><span class="people-count">'+ST.people+'</span><button class="people-btn" onclick="chP(1)">+</button></div></div><div class="progress-text"><span>Куплено</span><span>'+done+' / '+total+'</span></div><div class="progress-bar-wrap"><div class="progress-bar" style="width:'+pct+'%"></div></div></div>';

    html+='<div class="check-group"><div class="check-group-title">'+g.group+'</div>';
    g.items.forEach(function(item){
      var chk=!!ST.shopCh[item.id];
      var qty=ST.shopQ[item.id]||(item.pp>0?(item.pp*ST.people)+' '+item.unit:item.qty);
      html+='<div class="check-item'+(chk?' done':'')+'" onclick="togS(\''+item.id+'\',this)"><div class="check-box'+(chk?' checked':'')+'"></div><span class="check-text">'+item.name+'</span><input class="check-qty-input" type="text" value="'+qty+'" onclick="event.stopPropagation()" onchange="updQ(\''+item.id+'\',this.value)"></div>';

  el.innerHTML=html;

  +R('Хе из симы','Корейское, острое',ING([['Филе кубиками','400 г'],['Уксус / лимон','3 ст.л.'],['Соевый соус','2 ст.л.'],['Чеснок, хлопья перца, кунжутное масло','по вкусу']])+M('Смешать всё, мариновать 30 мин — рыба побелеет. Подавать холодным. Подать с: Jager тоник.'))
  +R('Сугудай','Мягче хе',M('Рыба кубиками + лук + соль + перец + уксус + масло. Перемешать, 15-20 мин.'))
  +R('Сашими','Только свежепойманная',M('Нарезать поперёк волокна под 45°, ломти ~5 мм. Соевый + васаби + имбирь. Подать с: French 75.'))
  +'<div class="sec-h">Деликатесы Сахалина</div>'
  +R('Устрицы на костре с сыром','',M('На решётку выпуклой стороной вниз. Когда откроются (~7 мин) — снять крышку. Масло + тёртый сыр. Ещё 2 мин. Лимон. Подать с: French 75 или брют.'))
  +R('Устрицы сырые','Классика',M('Открыть, отделить мясо. Несколько капель лимона. Выпить из раковины. Подать с: Kir Royale.'))
  +R('Гребешок на сковороде','2 минуты',M('Сковорода очень горячая. Масло. Обсушить гребешок. 1-1.5 мин с каждой стороны. Соль, перец, масло + чеснок. Подать с: белое сухое.'))
  +R('Краб варёный','',M('Кипящая солёная вода. Варить 15-20 мин. Остудить. Разломить, обмакнуть в растопленное масло. Подать с: белое сухое или Spritz.'))
  +R('Морской ёж','Деликатес прямо из воды',M('Разрезать ножницами по экватору. Достать оранжевые языки. Съесть так или с соевым. Подать с: брют — обязательно.'))
  +R('Мидии на костре','Открываются сами',M('На решётку над углями. Когда раковины откроются — готово. Не открылись — выбросить. Лимон + соевый.'))
  +R('Трубач варёный','',M('Варить 7-10 мин. Достать зубочисткой. Нарезать тонко. Соевый + имбирь + кунжутное масло.'))
  +'<div class="sec-h">Паста</div>'
  +R('Карбонара из симы','Вместо гуанчиале — буженина',ING([['Спагетти','300 г'],['Яичные желтки','4 шт'],['Пармезан / сыр твёрдый','80 г'],['Буженина кубиками','150 г'],['Черный перец (много!)','по вкусу']])+M('Сварить пасту аль денте. Обжарить буженину. Желтки + сыр + перец смешать. Горячую пасту снять с огня, влить смесь, быстро перемешать. На огонь не ставить!'))
  +R('Феттучини с симой','',ING([['Паста','300 г'],['Филе симы','300 г'],['Сливки','150 мл'],['Чеснок, лимон, укроп','по вкусу']])+M('Рыбу обжарить 2-3 мин. Сливки + чеснок, тушить 3-4 мин. Смешать с пастой. Лимон + укроп. Подать с: Wine Spritzer.'))
  +R('Макароны по-флотски','Резерв',M('Тушняк обжарить с луком. Смешать с варёными макаронами. Перец сверху.'))
  +R('Рис с рыбой','',M('Рис сварить. Симу разобрать, обжарить с луком и чесноком. Смешать. Соевый + кунжутное масло. Лук перья сверху.'))
  +'<div class="sec-h">Яйца</div>'

  +R('Голландский соус','Слабый огонь!',ING([['Сливочное масло','150 г'],['Желтки','4 шт'],['Лимонный сок','2 ст.л.']])+M('Масло растопить, не кипятить. Желтки + лимон взбить. Кружку над паром. Тонкой струйкой масло — постоянно мешать. Свернулся → ложка холодной воды + мешать.'))
  +R('Шакшука','',M('Лук + чеснок обжарить. Томатная паста + вода + паприка + тмин, 5 мин. Углубления → вбить яйца. Накрыть крышкой, 4-5 мин. В сковороде с хлебом.'))
  +'<div class="sec-h">Кофе</div>'

}

function CC(name,sub,tag,ings,method){return '<div class="card" onclick="toggle(this)"><div class="card-hd"><div><div class="card-title">'+name+'</div>'+(sub?'<div class="card-sub">'+sub+'</div>':'')+'</div><div style="display:flex;gap:6px;align-items:center"><span class="tag tag-'+tag+'">'+(tag==='easy'?'просто':tag==='med'?'средне':'сложнее')+'</span><span class="card-arrow">&#9660;</span></div></div><div class="card-body"><div class="ing-label">Ингредиенты</div>'+ings.map(function(i){return '<div class="row"><span>'+i[0]+'</span><span class="row-val">'+i[1]+'</span></div>';}).join('')+'<div class="method">'+method+'</div></div></div>';}

function setBF(f){bF=f;rBar();}

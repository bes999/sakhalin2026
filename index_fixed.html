<script>
// ===== STATE =====
var ST={people:3,menuOv:{},shopCh:{},shopQ:{},catches:[],gearPC:{},gearCC:{},riverN:{},expenses:[],settlements:[],shopCustom:[],gearCustom:[],members:[],medkitCommon:{},medkitPersonal:{},medkitCustom:[]};
var mF='all', bF='gin', gT='common', catchKept=true, mealPickDI=0, mealPickMI=0, mealPickType='dinner';

// ===== SYNC =====
var PERSONAL_FIELDS = ['menuOv','shopCh','shopQ','shopCustom','shopDeleted','shopExtra',
  'gearPC','gearCC','gearCommonDel','gearCommonExtra','gearPersonalDel','gearCustom',
  'riverN','riverPoints','pantryDeleted','menuOv']; // personal per device
var catchesUnsub = null;
var expensesUnsub = null;
var settlementsUnsub = null;
var membersUnsub = null;
var medkitUnsub = null;
var medkitLayerStateCache = null;
var medkitLayerSaveTimer = null;

function saveLocal(){
  try{localStorage.setItem('s26',JSON.stringify(ST));}catch(e){}
}

function load(){
  try{
    var s=JSON.parse(localStorage.getItem('s26')||'{}');
    var keys=Object.keys(s);
    for(var i=0;i<keys.length;i++) ST[keys[i]]=s[keys[i]];
  }catch(e){}
  loadFromFirebase();
}

function save(){
  saveLocal();
  saveToFirebase();
}

function saveToFirebase(){
  if(typeof tripRef==='undefined') return;
  tripRef.set({updatedAt:new Date().toISOString()},{merge:true})
    .catch(function(e){console.log('Firebase save error:',e);});
}

function normalizeCatch(item,id){
  if(!item) return null;
  var copy=JSON.parse(JSON.stringify(item));
  copy._id=id||copy._id||null;
  return copy;
}

function normalizeExpense(item,id){
  if(!item) return null;
  var copy=JSON.parse(JSON.stringify(item));
  copy._id=id||copy._id||null;
  return copy;
}

function normalizeSettlement(item,id){
  if(!item) return null;
  var copy=JSON.parse(JSON.stringify(item));
  copy._id=id||copy._id||null;
  return copy;
}

function normalizeMember(item,id){
  if(!item) return null;
  var copy=JSON.parse(JSON.stringify(item));
  copy._id=id||copy._id||null;
  if(copy.isActive===undefined) copy.isActive=true;
  return copy;
}

function buildMedkitPayload(){
  return {
    medkitCommon: ST.medkitCommon || {},
    medkitPersonal: ST.medkitPersonal || {},
    medkitCommonCustom: ST.medkitCommonCustom || [],
    medkitPersonalCustom: ST.medkitPersonalCustom || {},
    medkitCommonDeleted: ST.medkitCommonDeleted || {},
    medkitPersonalDeleted: ST.medkitPersonalDeleted || {},
    medkitCommonGroupHidden: ST.medkitCommonGroupHidden || {},
    medkitPersonalGroupHidden: ST.medkitPersonalGroupHidden || {},
    updatedAt: new Date().toISOString()
  };
}

function applyMedkitPayload(data){
  data = data || {};
  ST.medkitCommon = data.medkitCommon || {};
  ST.medkitPersonal = data.medkitPersonal || {};
  ST.medkitCommonCustom = Array.isArray(data.medkitCommonCustom) ? data.medkitCommonCustom : [];
  ST.medkitPersonalCustom = data.medkitPersonalCustom || {};
  ST.medkitCommonDeleted = data.medkitCommonDeleted || {};
  ST.medkitPersonalDeleted = data.medkitPersonalDeleted || {};
  ST.medkitCommonGroupHidden = data.medkitCommonGroupHidden || {};
  ST.medkitPersonalGroupHidden = data.medkitPersonalGroupHidden || {};
}

function saveMedkitToFirebase(){
  if(typeof medkitRef==='undefined') return Promise.resolve();
  return medkitRef.set(buildMedkitPayload(), {merge:true}).catch(function(e){
    console.log('medkit save error:', e);
  });
}

function loadMedkitFromFirebase(){
  if(typeof medkitRef==='undefined') return Promise.resolve();
  return medkitRef.get().then(function(doc){
    if(doc.exists){
      var data = doc.data() || {};
      applyMedkitPayload(data);
      medkitLayerStateCache = cloneMedkitLayerState(data.layerV4State || null);
    } else {
      medkitLayerStateCache = null;
    }
  }).catch(function(e){
    console.log('medkit load error:', e);
  });
}

function medkitPayloadEqual(a,b){
  try{
    return JSON.stringify({
      medkitCommon: (a && a.medkitCommon) || {},
      medkitPersonal: (a && a.medkitPersonal) || {},
      medkitCommonCustom: (a && a.medkitCommonCustom) || [],
      medkitPersonalCustom: (a && a.medkitPersonalCustom) || {},
      medkitCommonDeleted: (a && a.medkitCommonDeleted) || {},
      medkitPersonalDeleted: (a && a.medkitPersonalDeleted) || {},
      medkitCommonGroupHidden: (a && a.medkitCommonGroupHidden) || {},
      medkitPersonalGroupHidden: (a && a.medkitPersonalGroupHidden) || {}
    }) === JSON.stringify({
      medkitCommon: (b && b.medkitCommon) || {},
      medkitPersonal: (b && b.medkitPersonal) || {},
      medkitCommonCustom: (b && b.medkitCommonCustom) || [],
      medkitPersonalCustom: (b && b.medkitPersonalCustom) || {},
      medkitCommonDeleted: (b && b.medkitCommonDeleted) || {},
      medkitPersonalDeleted: (b && b.medkitPersonalDeleted) || {},
      medkitCommonGroupHidden: (b && b.medkitCommonGroupHidden) || {},
      medkitPersonalGroupHidden: (b && b.medkitPersonalGroupHidden) || {}
    });
  }catch(e){
    return false;
  }
}

function sortMembers(arr){
  arr.sort(function(a,b){
    var av=((a&&a.displayName)||'').toLowerCase();
    var bv=((b&&b.displayName)||'').toLowerCase();
    if(av<bv) return -1;
    if(av>bv) return 1;
    return 0;
  });
  return arr;
}

function getTripMembers(){
  return sortMembers((ST.members||[]).filter(function(m){return !!m && m.isActive!==false;}));
}

function getTripMemberNames(){
  return getTripMembers().map(function(m){return m.displayName;});
}

function getActiveTripMemberCount(){
  var c=getTripMembers().length;
  return c>0 ? c : (ST.people||0);
}

function findMemberByName(name){
  name=(name||'').trim().toLowerCase();
  var members=getTripMembers();
  for(var i=0;i<members.length;i++){
    if(((members[i].displayName||'').trim().toLowerCase())===name) return members[i];
  }
  return null;
}

function slugifyMemberName(name){
  return (name||'member').toLowerCase()
    .replace(/[^a-zа-я0-9]+/gi,'-')
    .replace(/^-+|-+$/g,'')
    .substring(0,40) || ('member-'+Date.now());
}

function addManualMemberToFirebase(name){
  if(typeof db==='undefined') return Promise.resolve(null);
  name=(name||'').trim();
  if(!name) return Promise.resolve(null);
  var existing=findMemberByName(name);
  if(existing) return Promise.resolve(existing);
  var idBase=slugifyMemberName(name);
  var docId=idBase;
  return membersRef.doc(docId).get().then(function(doc){
    if(doc.exists) docId=idBase+'-'+Date.now();
    var payload={
      displayName:name,
      tripRole:'participant',
      memberType:'manual',
      isActive:true,
      createdAt:new Date().toISOString()
    };
    return membersRef.doc(docId).set(payload).then(function(){
      payload._id=docId;
      return payload;
    });
  }).catch(function(e){
    console.log('add manual member error:',e);
    return null;
  });
}


function updateMemberInFirebase(id,payload){
  if(typeof db==='undefined' || !id) return Promise.resolve();
  payload.updatedAt=new Date().toISOString();
  return membersRef.doc(id).set(payload,{merge:true}).catch(function(e){
    console.log('update member error:',e);
  });
}

function deactivateMemberInFirebase(id){
  if(typeof db==='undefined' || !id) return Promise.resolve();
  return membersRef.doc(id).set({isActive:false,updatedAt:new Date().toISOString()},{merge:true}).catch(function(e){
    console.log('deactivate member error:',e);
  });
}

function reactivateMemberInFirebase(id){
  if(typeof db==='undefined' || !id) return Promise.resolve();
  return membersRef.doc(id).set({isActive:true,updatedAt:new Date().toISOString()},{merge:true}).catch(function(e){
    console.log('reactivate member error:',e);
  });
}

function deleteMemberPermanent(id){
  if(typeof db==='undefined' || !id) return Promise.resolve();
  return membersRef.doc(id).delete().catch(function(e){
    console.log('delete member error:',e);
  });
}

function openMemberForm(id){
  memberEditId=id||null;
  memberFormOpen=true;
  render('members');
}

function closeMemberForm(){
  memberEditId=null;
  memberFormOpen=false;
  render('members');
}

function saveMemberForm(){
  var nameEl=document.getElementById('memberNameInput');
  var roleEl=document.getElementById('memberRoleInput');
  var phoneEl=document.getElementById('memberPhoneInput');
  var noteEl=document.getElementById('memberNoteInput');
  var ecNameEl=document.getElementById('memberEmergencyNameInput');
  var ecPhoneEl=document.getElementById('memberEmergencyPhoneInput');
  if(!nameEl||!roleEl) return;
  var name=(nameEl.value||'').trim();
  var role=(roleEl.value||'participant').trim();
  var phone=phoneEl ? (phoneEl.value||'').trim() : '';
  var note=noteEl ? (noteEl.value||'').trim() : '';
  var emergencyContactName=ecNameEl ? (ecNameEl.value||'').trim() : '';
  var emergencyContactPhone=ecPhoneEl ? (ecPhoneEl.value||'').trim() : '';
  if(!name){ showToast('Введи имя участника',true); return; }
  var payload={displayName:name,tripRole:role,phone:phone,note:note,emergencyContactName:emergencyContactName,emergencyContactPhone:emergencyContactPhone};
  if(memberEditId){
    updateMemberInFirebase(memberEditId,payload);
    memberEditId=null;
    memberFormOpen=false;
    render('members');
    return;
  }
  addManualMemberToFirebase(name).then(function(member){
    if(!member) return;
    updateMemberInFirebase(member._id||slugifyMemberName(name),payload);
    memberFormOpen=false;
    render('members');
  });
}

function memberRoleLabel(role){
  if(role==='owner') return 'Владелец';
  if(role==='editor') return 'Редактор';
  if(role==='viewer') return 'Только просмотр';
  return 'Участник';
}

function rMembers(){
  var el=document.getElementById('p-members');
  var all=(ST.members||[]).slice();
  all=sortMembers(all);
  var edit=null;
  for(var i=0;i<all.length;i++){ if(all[i]._id===memberEditId){ edit=all[i]; break; } }
  var h='<div class="shop-header"><div class="info-title">Участники поездки</div><div class="mini-note">Здесь можно добавить участника вручную, поменять имя и роль, либо деактивировать его. Деактивированные не участвуют в расчётах. Неактивного участника можно удалить полностью.</div>' +
    '<button class="action-btn" style="margin-bottom:0" onclick="openMemberForm()">+ Добавить участника</button></div>';
  h+='<div class="form-card'+((memberFormOpen||memberEditId!==null||all.length===0)?' show':'')+'">'+
    '<div class="form-row"><label class="form-label">Имя участника</label><input id="memberNameInput" class="form-input" placeholder="Например, Алексей" value="'+(edit?((edit.displayName||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')):'')+'"></div>'+
    '<div class="form-row"><label class="form-label">Роль в поездке</label><select id="memberRoleInput" class="form-select">'+
      '<option value="participant"'+(edit&&edit.tripRole==='participant'?' selected':'')+'>Участник</option>'+
      '<option value="owner"'+(edit&&edit.tripRole==='owner'?' selected':'')+'>Владелец</option>'+
      '<option value="editor"'+(edit&&edit.tripRole==='editor'?' selected':'')+'>Редактор</option>'+
      '<option value="viewer"'+(edit&&edit.tripRole==='viewer'?' selected':'')+'>Только просмотр</option>'+
    '</select></div>'+
    '<div class="form-row"><label class="form-label">Телефон</label><input id="memberPhoneInput" class="form-input" placeholder="+7..." value="'+(edit?((edit.phone||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')):'')+'"></div>'+
    '<div class="form-row"><label class="form-label">Экстренный контакт — имя</label><input id="memberEmergencyNameInput" class="form-input" placeholder="Кого уведомлять" value="'+(edit?((edit.emergencyContactName||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')):'')+'"></div>'+
    '<div class="form-row"><label class="form-label">Экстренный контакт — телефон</label><input id="memberEmergencyPhoneInput" class="form-input" placeholder="+7..." value="'+(edit?((edit.emergencyContactPhone||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')):'')+'"></div>'+
    '<div class="form-row"><label class="form-label">Заметка</label><input id="memberNoteInput" class="form-input" placeholder="Например: аптечка у него / связь плохая / водитель" value="'+(edit?((edit.note||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')):'')+'"></div>'+
    '<div style="display:flex;gap:8px"><button class="save-btn" style="flex:1" onclick="saveMemberForm()">'+(memberEditId!==null?'Сохранить':'Добавить')+'</button>'+((memberFormOpen||memberEditId!==null)?'<button class="picker-cancel" style="flex:1;margin-top:0" onclick="closeMemberForm()">Отмена</button>':'')+'</div>'+
    '</div>';
  h+='<div class="sec-h">Активные</div>';
  var active=all.filter(function(m){return m&&m.isActive!==false;});
  var inactive=all.filter(function(m){return m&&m.isActive===false;});
  if(!active.length) h+='<div class="info-card">Пока нет активных участников.</div>';
  for(var j=0;j<active.length;j++){
    var m=active[j];
    h+='<div class="member-card"><div class="member-main"><div class="member-name">'+(m.displayName||'Без имени')+'</div><div class="member-meta"><span class="pill">'+memberRoleLabel(m.tripRole||'participant')+'</span><span class="pill">'+(m.memberType==='manual'?'Вручную':'Связанный')+'</span>'+(m.phone?'<span class="pill">'+m.phone+'</span>':'')+'</div>'+(m.emergencyContactName||m.emergencyContactPhone||m.note?'<div class="member-extra">'+(m.emergencyContactName||m.emergencyContactPhone?('SOS: '+(m.emergencyContactName||'')+(m.emergencyContactPhone?' · '+m.emergencyContactPhone:'')):'')+(m.note?((m.emergencyContactName||m.emergencyContactPhone)?'<br>':'')+'Заметка: '+m.note:'')+'</div>':'')+'</div><div class="member-actions"><button class="icon-btn" onclick="openMemberForm(\''+m._id+'\')">✎</button><button class="icon-btn danger" onclick="confirmAction(\'Убрать участника из активных?\',\'Убрать\',function(){deactivateMemberInFirebase(\''+m._id+'\');})">⊖</button></div></div>';
  }
  if(inactive.length){
    h+='<div class="sec-h">Неактивные</div>';
    for(var k=0;k<inactive.length;k++){
      var x=inactive[k];
      h+='<div class="member-card"><div class="member-main"><div class="member-name">'+(x.displayName||'Без имени')+'</div><div class="member-meta"><span class="pill">Неактивен</span><span class="pill">'+memberRoleLabel(x.tripRole||'participant')+'</span>'+(x.phone?'<span class="pill">'+x.phone+'</span>':'')+'</div>'+(x.emergencyContactName||x.emergencyContactPhone||x.note?'<div class="member-extra">'+(x.emergencyContactName||x.emergencyContactPhone?('SOS: '+(x.emergencyContactName||'')+(x.emergencyContactPhone?' · '+x.emergencyContactPhone:'')):'')+(x.note?((x.emergencyContactName||x.emergencyContactPhone)?'<br>':'')+'Заметка: '+x.note:'')+'</div>':'')+'</div><div class="member-actions"><button class="icon-btn" onclick="reactivateMemberInFirebase(\''+x._id+'\')">↺</button><button class="icon-btn danger" onclick="confirmAction(\'Удалить участника полностью? Необратимо.\',\'Удалить\',function(){deleteMemberPermanent(\''+x._id+'\');})">🗑</button></div></div>';

  }

}

function medkitStore(mode,memberId){

    if(!ST.medkitPersonal) ST.medkitPersonal={};

}
function ensureMedkitMeta(mode,memberId){
  if(!ST.medkitCommonCustom || !Array.isArray(ST.medkitCommonCustom)) ST.medkitCommonCustom=[];
  if(!ST.medkitPersonalCustom || typeof ST.medkitPersonalCustom!=='object') ST.medkitPersonalCustom={};
  if(!ST.medkitCommonDeleted || typeof ST.medkitCommonDeleted!=='object') ST.medkitCommonDeleted={};
  if(!ST.medkitPersonalDeleted || typeof ST.medkitPersonalDeleted!=='object') ST.medkitPersonalDeleted={};
  if(!ST.medkitCommonGroupHidden || typeof ST.medkitCommonGroupHidden!=='object') ST.medkitCommonGroupHidden={};
  if(!ST.medkitPersonalGroupHidden || typeof ST.medkitPersonalGroupHidden!=='object') ST.medkitPersonalGroupHidden={};
  var id=memberId||'';
  if(mode==='personal'){
    if(!ST.medkitPersonalCustom[id] || !Array.isArray(ST.medkitPersonalCustom[id])) ST.medkitPersonalCustom[id]=[];
    if(!ST.medkitPersonalDeleted[id] || typeof ST.medkitPersonalDeleted[id] !== 'object') ST.medkitPersonalDeleted[id]={};
    if(!ST.medkitPersonalGroupHidden[id] || typeof ST.medkitPersonalGroupHidden[id] !== 'object') ST.medkitPersonalGroupHidden[id]={};
  }

function getMedkitCustomList(mode,memberId){

}
function getMedkitDeletedMap(mode,memberId){

function getMedkitHiddenGroupsMap(mode,memberId){
  ensureMedkitMeta(mode,memberId);
  if(mode==='personal') return ST.medkitPersonalGroupHidden[memberId||''] || {};
  return ST.medkitCommonGroupHidden || {};

function getMedkitGroups(mode,memberId){
  ensureMedkitMeta(mode,memberId);
  var deleted=getMedkitDeletedMap(mode,memberId);
  var hiddenGroups=getMedkitHiddenGroupsMap(mode,memberId);
  var custom=getMedkitCustomList(mode,memberId);
  var map={}, order=[];
  for(var g=0;g<MEDKIT_BASE.length;g++){
    var baseGroup=MEDKIT_BASE[g];
    if(hiddenGroups[baseGroup.group]) continue;
    map[baseGroup.group]={group:baseGroup.group,items:[]};
    order.push(baseGroup.group);
    for(var i=0;i<baseGroup.items.length;i++){
      var baseItem=baseGroup.items[i];
      if(!deleted[baseItem.id]) map[baseGroup.group].items.push(baseItem);
    }
  }
  for(var c=0;c<custom.length;c++){
    var item=custom[c];
    if(deleted[item.id]) continue;
    if(hiddenGroups[item.group]) continue;
    if(!map[item.group]){
      map[item.group]={group:item.group,items:[]};
      order.push(item.group);
    }
    map[item.group].items.push(item);
  }
  var groups=[];
  for(var o=0;o<order.length;o++){
    var grp=map[order[o]];
    if(grp && grp.items.length) groups.push(grp);
  }
  return groups;
}
function getHiddenMedkitItems(mode,memberId){
  ensureMedkitMeta(mode,memberId);
  var deleted=getMedkitDeletedMap(mode,memberId);
  var hidden=[];
  var seen={};
  for(var g=0;g<MEDKIT_BASE.length;g++){
    for(var i=0;i<MEDKIT_BASE[g].items.length;i++){
      var item=MEDKIT_BASE[g].items[i];
      if(deleted[item.id]){
        hidden.push({id:item.id,name:item.name,group:MEDKIT_BASE[g].group,custom:false});
        seen[item.id]=true;
      }
    }
  }
  var custom=getMedkitCustomList(mode,memberId);
  for(var c=0;c<custom.length;c++){
    var item=custom[c];
    if(deleted[item.id] && !seen[item.id]) hidden.push({id:item.id,name:item.name,group:item.group,custom:true});
  }
  return hidden;
}
function medkitProgress(mode,memberId){
  var groups=getMedkitGroups(mode,memberId);
  var items=[];
  for(var g=0;g<groups.length;g++){
    for(var i=0;i<groups[g].items.length;i++) items.push(groups[g].items[i]);
  }
  var store=medkitStore(mode,memberId);
  var done=0;
  for(var j=0;j<items.length;j++) if(store[items[j].id] && store[items[j].id].checked) done++;

}

function medkitStackSummary(mode,memberId){
  var out={};
  var groups=getMedkitGroups(mode,memberId);
  var store=medkitStore(mode,memberId);
  for(var g=0;g<groups.length;g++){
    if(groups[g].group!=='БАДы / витамины') continue;
    for(var i=0;i<groups[g].items.length;i++){
      var item=groups[g].items[i];
      var st=store[item.id]||{};
      var slot=st.slot||'Утро';
      if(!out[slot]) out[slot]=[];
      out[slot].push({name:item.name,how:st.how||'',taken:st.taken||{}});
    }
  }
  return out;
}

function sortSharedArr(arr){
  arr.sort(function(a,b){
    var av=(a&& (a.createdAt||a.date)) || '';
    var bv=(b&& (b.createdAt||b.date)) || '';
    if(av<bv) return -1;
    if(av>bv) return 1;
    return 0;
  });
  return arr;
}

function migrateLegacyArraysIfNeeded(data){
  if(typeof db==='undefined' || !data) return Promise.resolve();
  var jobs=[];

  if(Array.isArray(data.catches) && data.catches.length){
    jobs.push(catchesRef.limit(1).get().then(function(snap){
      if(!snap.empty) return null;
      var batch=db.batch();
      for(var i=0;i<data.catches.length;i++){
        var ref=catchesRef.doc();
        var payload=Object.assign({},data.catches[i],{createdAt:data.catches[i].createdAt||new Date().toISOString(),migratedFromLegacy:true});
        batch.set(ref,payload);
      }
      return batch.commit();
    }));
  }

  if(Array.isArray(data.expenses) && data.expenses.length){
    jobs.push(expensesRef.limit(1).get().then(function(snap){
      if(!snap.empty) return null;
      var batch=db.batch();
      for(var i=0;i<data.expenses.length;i++){
        var ref=expensesRef.doc();
        var payload=Object.assign({},data.expenses[i],{createdAt:data.expenses[i].createdAt||new Date().toISOString(),migratedFromLegacy:true});
        batch.set(ref,payload);
      }
      return batch.commit();
    }));
  }

  if(!jobs.length) return Promise.resolve();
  return Promise.all(jobs);
}

function loadSharedCollections(){
  return Promise.all([
    catchesRef.get().then(function(snap){
      var arr=[];
      snap.forEach(function(doc){arr.push(normalizeCatch(doc.data(),doc.id));});
      ST.catches=sortSharedArr(arr);
    }),
    expensesRef.get().then(function(snap){
      var arr=[];
      snap.forEach(function(doc){arr.push(normalizeExpense(doc.data(),doc.id));});
      ST.expenses=sortSharedArr(arr);
    }),
    settlementsRef.get().then(function(snap){
      var arr=[];
      snap.forEach(function(doc){arr.push(normalizeSettlement(doc.data(),doc.id));});
      ST.settlements=sortSharedArr(arr);
    }),
    membersRef.get().then(function(snap){
      var arr=[];
      snap.forEach(function(doc){arr.push(normalizeMember(doc.data(),doc.id));});
      ST.members=sortMembers(arr);
    })
  ]).then(function(){
    saveLocal();
    render(currentPage||'route');
  });
}

function loadFromFirebase(){
  if(typeof db==='undefined') return;
  tripRef.get()
    .then(function(doc){
      if(doc.exists) return migrateLegacyArraysIfNeeded(doc.data()||{});
    })
    .then(function(){
      return Promise.all([
        loadSharedCollections(),
        loadMedkitFromFirebase()
      ]);
    })
    .then(function(){
      saveLocal();
      render(currentPage||'route');
      showSyncStatus('Синхронизировано ✓');
    })
    .catch(function(e){
      console.log('Firebase load error:',e);
      showSyncStatus('Офлайн — данные локальные');
    });
}

var MEDKIT_OPEN_STATE={};
function medkitOpenKey(mode,memberId,group){ return [mode||'',memberId||'',group||''].join('||'); }
function snapshotMedkitOpenState(){
  try{
    var root=document.getElementById('p-medkit'); if(!root) return;
    var nodes=root.querySelectorAll('details.check-group[data-group]');
    for(var i=0;i<nodes.length;i++){
      var g=nodes[i].getAttribute('data-group')||'';
      MEDKIT_OPEN_STATE[medkitOpenKey(medkitMode,medkitMemberId,g)] = !!nodes[i].open;
    }
  }catch(e){}
}
function isMedkitOpen(mode,memberId,group,idx){
  var key=medkitOpenKey(mode,memberId,group);
  return Object.prototype.hasOwnProperty.call(MEDKIT_OPEN_STATE,key) ? !!MEDKIT_OPEN_STATE[key] : idx===0;
}

function showSyncStatus(msg){
  var el=document.getElementById('syncStatus');
  if(el){el.textContent=msg;setTimeout(function(){el.textContent='';},3000);}
}
function showToast(msg,isError){
  var t=document.getElementById('appToast');
  if(!t) return;
  t.textContent=msg;
  t.style.background=isError?'#c0392b':'#1F4E79';
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.classList.remove('show');},2500);
}
var _confirmCb=null;
function confirmAction(msg,yesLabel,fn){
  var m=document.getElementById('confirmModal');
  var msgEl=document.getElementById('confirmMsg');
  var yesBtn=document.getElementById('confirmYesBtn');
  if(!m) return;
  msgEl.textContent=msg;
  yesBtn.textContent=yesLabel||'Удалить';
  yesBtn.style.background=yesLabel&&yesLabel!=='Удалить'?'#1F4E79':'#c0392b';
  _confirmCb=fn;
  m.style.display='block';
  document.getElementById('overlay').style.display='block';
}
function confirmYes(){
  document.getElementById('confirmModal').style.display='none';
  document.getElementById('overlay').style.display='none';
  if(_confirmCb){ var cb=_confirmCb; _confirmCb=null; cb(); }
}
function confirmNo(){
  document.getElementById('confirmModal').style.display='none';
  document.getElementById('overlay').style.display='none';
  _confirmCb=null;
}

function subscribeFirebase(){
  if(typeof db==='undefined') return;
  if(catchesUnsub) catchesUnsub();
  if(expensesUnsub) expensesUnsub();
  if(settlementsUnsub) settlementsUnsub();
  if(membersUnsub) membersUnsub();
  if(medkitUnsub) medkitUnsub();

  catchesUnsub = catchesRef.onSnapshot(function(snap){
    var arr=[];
    snap.forEach(function(doc){arr.push(normalizeCatch(doc.data(),doc.id));});
    arr=sortSharedArr(arr);
    var newVal=JSON.stringify(arr);
    var oldVal=JSON.stringify(ST.catches||[]);
    if(newVal!==oldVal){
      ST.catches=arr;
      saveLocal();
      if(currentPage==='catch' || document.getElementById('river-detail').classList.contains('show')) render(currentPage||'route');
      showSyncStatus('Улов обновлён ✓');
    }
  },function(e){console.log('catches snapshot error:',e);});

  expensesUnsub = expensesRef.onSnapshot(function(snap){
    var arr=[];
    snap.forEach(function(doc){arr.push(normalizeExpense(doc.data(),doc.id));});
    arr=sortSharedArr(arr);
    var newVal=JSON.stringify(arr);
    var oldVal=JSON.stringify(ST.expenses||[]);
    if(newVal!==oldVal){
      ST.expenses=arr;
      saveLocal();
      if(currentPage==='expenses' || currentPage==='members') render(currentPage||'route');
      showSyncStatus('Расходы обновлены ✓');
    }
  },function(e){console.log('expenses snapshot error:',e);});

  settlementsUnsub = settlementsRef.onSnapshot(function(snap){
    var arr=[];
    snap.forEach(function(doc){arr.push(normalizeSettlement(doc.data(),doc.id));});
    arr=sortSharedArr(arr);
    var newVal=JSON.stringify(arr);
    var oldVal=JSON.stringify(ST.settlements||[]);
    if(newVal!==oldVal){
      ST.settlements=arr;
      saveLocal();
      if(currentPage==='expenses') render(currentPage||'route');
      showSyncStatus('Погашения обновлены ✓');
    }
  },function(e){console.log('settlements snapshot error:',e);});

  membersUnsub = membersRef.onSnapshot(function(snap){
    var arr=[];
    snap.forEach(function(doc){arr.push(normalizeMember(doc.data(),doc.id));});
    arr=sortMembers(arr);
    var newVal=JSON.stringify(arr);
    var oldVal=JSON.stringify(ST.members||[]);
    if(newVal!==oldVal){
      ST.members=arr;
      saveLocal();
      if(currentPage==='expenses' || currentPage==='members') render(currentPage||'route');
      showSyncStatus('Участники обновлены ✓');
    }
  },function(e){console.log('members snapshot error:',e);});

  medkitUnsub = medkitRef.onSnapshot(function(doc){
    if(!doc.exists) return;
    var incoming = doc.data() || {};
    var current = buildMedkitPayload();
    var payloadChanged = !medkitPayloadEqual(incoming, current);
    var layerChanged = !medkitLayerStateEqual(incoming.layerV4State || null, medkitLayerStateCache);
    if(!payloadChanged && !layerChanged) return;
    if(payloadChanged){
      applyMedkitPayload(incoming);
    }
    if(layerChanged){
      medkitLayerStateCache = cloneMedkitLayerState(incoming.layerV4State || null);
      var medkitPage=document.getElementById('p-medkit');
      var frame=document.getElementById('medkitLayerFrame');
      var layerOpen=!!(medkitPage && medkitPage.classList.contains('show') && frame);
      if(!layerOpen){
        pushMedkitLayerStateToFrame();
      }
    }
    saveLocal();
    if(payloadChanged && currentPage==='medkit') {
      render(currentPage||'route');
    }
    showSyncStatus('Аптечка обновлена ✓');
  },function(e){console.log('medkit snapshot error:',e);});
}

function addCatchToFirebase(entry){
  if(typeof db==='undefined') return Promise.resolve();
  var payload=Object.assign({},entry);
  delete payload._id;
  payload.createdAt=payload.createdAt||new Date().toISOString();
  return catchesRef.add(payload).then(function(ref){
    entry._id=ref.id;
    saveLocal();
    return ref.id;
  }).catch(function(e){console.log('add catch error:',e);});
}

function deleteCatchFromFirebase(id){
  if(typeof db==='undefined' || !id) return Promise.resolve();
  return catchesRef.doc(id).delete().catch(function(e){console.log('delete catch error:',e);});
}

function showPage(id,el){
  currentPage=id;
  document.getElementById('river-detail').classList.remove('show');
  var pages=document.querySelectorAll('.page');
  for(var i=0;i<pages.length;i++) pages[i].classList.remove('show');
  var bnavs=document.querySelectorAll('.bnav');
  for(var i=0;i<bnavs.length;i++) bnavs[i].classList.remove('active');
  document.getElementById('p-'+id).classList.add('show');
  var bn=document.getElementById('bn-'+id);
  if(bn) bn.classList.add('active');
  else if(el) el.classList.add('active');
  render(id);
}
function render(id){
  if(id==='route') rRoute();
  else if(id==='rivers') rRivers();
  else if(id==='menu') rMenu();
  else if(id==='shop') rShop();
  else if(id==='recipes') rRecipes();
  else if(id==='bar') rBar();
  else if(id==='catch') rCatch();
  else if(id==='gear') rGear();
  else if(id==='pantry') rPantry();
  else if(id==='expenses') rExpenses();
  else if(id==='members') rMembers();
  else if(id==='medkit') renderMedkitLayer();
  else if(id==='safety') rSafety();
}

div class=\"supp-item\"><div class=\"supp-name\">${esc(x.name)}</div>${x.how?`<div class=\"supp-how\">${esc(x.how)}</div>`:''}</div>`).join(''):'<div class=\"muted\">\u041f\u043e\u043a\u0430 \u043f\u0443\u0441\u0442\u043e</div>'}</div>`;\n  return `<div class=\"supp-stack\">${col('\u0423\u0442\u0440\u043e')}${col('\u0414\u0435\u043d\u044c')}${col('\u0412\u0435\u0447\u0435\u0440')}</div>`;\n}\nfunction renderQuickReference(){\n  return `<div class=\"card\"><h3 style=\"margin-bottom:8px;color:#1F4E79\">\u0411\u044b\u0441\u0442\u0440\u0430\u044f \u0441\u043f\u0440\u0430\u0432\u043a\u0430 \u043f\u043e \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044f\u043c</h3>\n    <div class=\"ref-grid\">\n      <div class=\"ref-card\"><h4>\u0411\u043e\u043b\u044c</h4><ul><li>\u0421\u043d\u0430\u0447\u0430\u043b\u0430 \u043e\u0446\u0435\u043d\u0438\u0442\u044c \u0441\u0438\u043b\u0443 \u0431\u043e\u043b\u0438 \u0438 \u043f\u0440\u0438\u0447\u0438\u043d\u0443.</li><li>\u041e\u0431\u044b\u0447\u043d\u043e \u0441\u043c\u043e\u0442\u0440\u044f\u0442: \u0418\u0431\u0443\u043f\u0440\u043e\u0444\u0435\u043d, \u041d\u0438\u043c\u0435\u0441\u0443\u043b\u0438\u0434, \u041a\u0435\u0442\u0430\u043d\u043e\u0432.</li></ul></div>\n      <div class=\"ref-card\"><h4>\u041f\u0440\u043e\u0441\u0442\u0443\u0434\u0430 / \u0442\u0435\u043c\u043f\u0435\u0440\u0430\u0442\u0443\u0440\u0430</h4><ul><li>\u041f\u043e\u043a\u043e\u0439, \u0432\u043e\u0434\u0430, \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0442\u0435\u043c\u043f\u0435\u0440\u0430\u0442\u0443\u0440\u044b.</li><li>\u041e\u0431\u044b\u0447\u043d\u043e \u0441\u043c\u043e\u0442\u0440\u044f\u0442: \u041f\u0430\u0440\u0430\u0446\u0435\u0442\u0430\u043c\u043e\u043b, \u0418\u0431\u0443\u043f\u0440\u043e\u0444\u0435\u043d.</li></ul></div>\n      <div class=\"ref-card\"><h4>\u0416\u041a\u0422 / \u043e\u0442\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435</h4><ul><li>\u0421\u043b\u0435\u0434\u0438\u0442\u044c \u0437\u0430 \u043e\u0431\u0435\u0437\u0432\u043e\u0436\u0438\u0432\u0430\u043d\u0438\u0435\u043c.</li><li>\u041e\u0431\u044b\u0447\u043d\u043e \u0441\u043c\u043e\u0442\u0440\u044f\u0442: \u0421\u043c\u0435\u043a\u0442\u0430, \u0440\u0435\u0433\u0438\u0434\u0440\u0430\u0442\u0430\u0446\u0438\u044f, \u0426\u0435\u0440\u0443\u043a\u0430\u043b.</li></ul></div>\n      <div class=\"ref-card\"><h4>\u0410\u043b\u043b\u0435\u0440\u0433\u0438\u044f</h4><ul><li>\u0423\u0431\u0440\u0430\u0442\u044c \u0432\u043e\u0437\u043c\u043e\u0436\u043d\u044b\u0439 \u0430\u043b\u043b\u0435\u0440\u0433\u0435\u043d.</li><li>\u041e\u0431\u044b\u0447\u043d\u043e \u0441\u043c\u043e\u0442\u0440\u044f\u0442: \u0421\u0443\u043f\u0440\u0430\u0441\u0442\u0438\u043d, \u044d\u043a\u0441\u0442\u0440\u0435\u043d\u043d\u044b\u0435 \u043f\u0440\u0435\u043f\u0430\u0440\u0430\u0442\u044b \u043f\u043e \u0441\u0445\u0435\u043c\u0435.</li></ul></div>\n    </div></div>`;\n}\nfunction renderLegendMini(){\n  return `<div class=\"legend-mini\"><div class=\"label\" style=\"font-weight:700;color:#1F4E79\">\u041e\u0431\u043e\u0437\u043d\u0430\u0447\u0435\u043d\u0438\u044f</div>\n    <div class=\"legend\">\n      <div class=\"legend-item\"><span class=\"badge green\">\u2022</span> \u0432\u0441\u0451 \u0432 \u043f\u043e\u0440\u044f\u0434\u043a\u0435</div>\n      <div class=\"legend-item\"><span class=\"badge orange\">\u2022</span> \u043e\u0441\u0442\u0430\u0442\u043a\u0430 \u043c\u0430\u043b\u043e, \u043f\u0440\u0438\u043c\u0435\u0440\u043d\u043e \u043d\u0430 1 \u043f\u0440\u0438\u0451\u043c</div>\n      <div class=\"legend-item\"><span class=\"badge red\">\u2022</span> \u0441\u0440\u043e\u043a \u0433\u043e\u0434\u043d\u043e\u0441\u0442\u0438 \u043f\u043e\u0434\u0445\u043e\u0434\u0438\u0442 \u0438\u043b\u0438 \u0438\u0441\u0442\u0451\u043a</div>\n    </div>\n  </div>`;\n}\nfunction renderItem(group,item){\n  const key=itemKey(group.key,item.id);\n  const entry=ensureEntry(currentDataBucket(), key);\n  const st=statusForEntry(group,item,entry);\n  return `<div class=\"item\" data-item-row=\"${esc(key)}\">\n    <div class=\"item-top\">\n      <div class=\"item-top-left\">\n        <input class=\"item-check\" type=\"checkbox\" data-check=\"${esc(key)}\" ${entry.checked?'checked':''}>\n        <div style=\"min-width:0;flex:1\">\n          <div class=\"item-name\"><span class=\"badge ${st.level}\">\u2022</span><button class=\"mini-link\" data-open-card=\"${esc(key)}\">${esc(item.name)}</button></div>\n          <div class=\"item-tag\">${esc(item.tag||'')}</div>\n          <div class=\"item-cat\">${esc(group.title)}</div>\n        </div>\n      </div>\n      <div class=\"item-actions\">\n        <button class=\"tiny-btn\" data-hide-item=\"${esc(key)}\">\u0421\u043a\u0440\u044b\u0442\u044c</button>\n        ${item.isCustom?`<button class=\"tiny-btn\" data-del-item=\"${esc(key)}\">\u0423\u0434\u0430\u043b\u0438\u0442\u044c</button>`:''}\n      </div>\n    </div>\n    <div class=\"item-meta-row\">\n      ${entry.place?`<span class=\"storage-chip\" style=\"padding:5px 9px\">${esc(entry.place)}</span>`:''}\n      <span class=\"status-text ${st.level}\" data-status-text=\"${esc(key)}\">${esc(st.text)}</span>\n      ${entry.comment?`<span class=\"muted\">${esc(entry.comment)}</span>`:''}\n    </div>\n  </div>`;\n}\nfunction renderGroupsView(){\n  const hidden=currentHiddenBucket(), hiddenGroups=currentHiddenGroupsBucket(), open=currentOpenBucket();\n  return BASE.groups.filter(group=>!hiddenGroups[group.key]).map((group,idx)=>{\n    const items=getGroupItems(group).filter(item=>!hidden[itemKey(group.key,item.id)] && itemMatchesSearch(group,item));\n    if(!items.length && state.searchQuery) return '';\n    const gs=groupStatus(group);\n    return `<details class=\"section\" data-group=\"${esc(group.key)}\" ${open[group.key]!==false?'open':''}>\n      <summary data-toggle-group=\"${esc(group.key)}\"><div class=\"summary-left\"><div class=\"summary-title\"><span class=\"badge ${gs}\">\u2022</span><span>${esc(group.title)}</span></div></div><div class=\"summary-right\"><span class=\"arrow\">\u25b8</span></div></summary>\n      <div class=\"section-body\">\n        <div class=\"group-tools\">\n          <button class=\"tiny-btn\" data-add-item=\"${esc(group.key)}\">${group.key==='supplements'?'\u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0411\u0410\u0414':'\u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u043f\u0440\u0435\u043f\u0430\u0440\u0430\u0442'}</button>\n          <button class=\"tiny-btn\" data-hide-group=\"${esc(group.key)}\">\u0421\u043a\u0440\u044b\u0442\u044c \u0440\u0430\u0437\u0434\u0435\u043b</button>\n        </div>\n        ${items.length?items.map(item=>renderItem(group,item)).join(''):'<div class=\"muted\">\u041d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u043e.</div>'}\n      </div>\n    </details>`;\n  }).join('');\n}\nfunction renderStorageView(){\n  const filter=currentFilter(), hidden=currentHiddenBucket();\n  if(!filter) return `<div class=\"card\"><div class=\"muted\">\u0412\u044b\u0431\u0435\u0440\u0438 \u043c\u0435\u0441\u0442\u043e \u0445\u0440\u0430\u043d\u0435\u043d\u0438\u044f \u0432\u044b\u0448\u0435 \u2014 \u0438 \u0443\u0432\u0438\u0434\u0438\u0448\u044c \u0435\u0434\u0438\u043d\u044b\u0439 \u0441\u043f\u0438\u0441\u043e\u043a \u0432\u0441\u0435\u0433\u043e, \u0447\u0442\u043e \u0442\u0430\u043c \u043b\u0435\u0436\u0438\u0442.</div></div>`;\n  const rows=[];\n  BASE.groups.forEach(group=>getGroupItems(group).forEach(item=>{\n    const key=itemKey(group.key,item.id);\n    const entry=ensureEntry(currentDataBucket(), key);\n    if(!hidden[key] && entry.place===filter && itemMatchesSearch(group,item)) rows.push(renderItem(group,item));\n  }));\n  return `<div class=\"card\"><h3 style=\"margin-bottom:8px;color:#1F4E79\">\u0421\u043e\u0434\u0435\u0440\u0436\u0438\u043c\u043e\u0435: ${esc(filter)}</h3>${rows.length?rows.join(''):'<div class=\"muted\">\u0412 \u044d\u0442\u043e\u043c \u043c\u0435\u0441\u0442\u0435 \u043f\u043e\u function cloneMedkitLayerState(v){
  try{ return JSON.parse(JSON.stringify(v)); }catch(e){ return null; }
}
function medkitLayerStateEqual(a,b){
  try{ return JSON.stringify(a||null) === JSON.stringify(b||null); }catch(e){ return false; }
}
function pushMedkitLayerStateToFrame(){
  var frame = document.getElementById('medkitLayerFrame');
  if(!frame || !frame.contentWindow || typeof frame.contentWindow.__applyExternalState !== 'function') return;
  try{ frame.contentWindow.__applyExternalState(cloneMedkitLayerState(medkitLayerStateCache)); }catch(e){ console.log('medkit layer push error:', e); }
}
function scheduleMedkitLayerSave(){
  if(typeof medkitRef==='undefined') return;
  if(medkitLayerSaveTimer) clearTimeout(medkitLayerSaveTimer);
  medkitLayerSaveTimer = setTimeout(function(){
    medkitLayerSaveTimer = null;
    medkitRef.set({layerV4State: cloneMedkitLayerState(medkitLayerStateCache), updatedAt:new Date().toISOString()},{merge:true}).catch(function(e){
      console.log('medkit layer save error:', e);
    });
  }, 250);
}
window.__medkitLayerHost = {
  getState: function(){ return cloneMedkitLayerState(medkitLayerStateCache); },
  saveState: function(nextState){
    if(!nextState || typeof nextState !== 'object') return;
    if(medkitLayerStateEqual(nextState, medkitLayerStateCache)) return;
    medkitLayerStateCache = cloneMedkitLayerState(nextState);
    scheduleMedkitLayerSave();
  },
  requestScrollTop: function(){
    var page = document.getElementById('p-medkit');
    if(page){
      try{ page.scrollIntoView({block:'start', behavior:'auto'}); }catch(err){}
    }
    try{ window.scrollTo({top:0, behavior:'auto'}); }catch(err){}
  },
  notifyHeight: function(height){
    var frame = document.getElementById('medkitLayerFrame');
    if(!frame) return;
    var h = parseInt(height,10) || 0;
    if(h < 240) h = 240;
    frame.style.height = h + 'px';
  }
};

function renderMedkitLayer(){
  var mount = document.getElementById('medkitLayerMount');
  if(!mount) return;
  var frame = document.getElementById('medkitLayerFrame');
  if(!frame){
    mount.innerHTML = '<div class="medkit-layer-shell"><iframe id="medkitLayerFrame" class="medkit-layer-frame" title="Аптечка"></iframe></div>';
    frame = document.getElementById('medkitLayerFrame');
    frame.onload = function(){ setTimeout(pushMedkitLayerStateToFrame, 50); };
    frame.srcdoc = MEDKIT_LAYER_SRCDOC;
  } else {
    setTimeout(pushMedkitLayerStateToFrame, 0);
  }
}
window.addEventListener('message', function(ev){
  if(!ev || !ev.data) return;
  var frame = document.getElementById('medkitLayerFrame');
  if(ev.data.type === 'medkitHeight'){
    if(!frame) return;
    var height = parseInt(ev.data.height, 10) || 0;
    if(height < 240) height = 240;
    frame.style.height = height + 'px';
    return;
  }
  if(ev.data.type === 'medkitScrollTop'){
    var page = document.getElementById('p-medkit');
    if(page){
      try{ page.scrollIntoView({block:'start', behavior:'auto'}); }catch(err){}
    }
    try{ window.scrollTo({top:0, behavior:'auto'}); }catch(err){}
  }
});
function toggle(c){c.classList.toggle('open');}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  var modals=document.querySelectorAll('.modal');
  for(var i=0;i<modals.length;i++) modals[i].classList.remove('show');
}
function openModal(id){
  document.getElementById('overlay').classList.add('show');
  document.getElementById(id).classList.add('show');
}

  }
  
  document.getElementById('constructorBody').innerHTML=h;
  // Wire up clicks via delegation
  document.getElementById('constructorBody').onclick=function(e){

function toggleMC(key, val){
  if(!MC[key]) MC[key]=[];
  var idx=MC[key].indexOf(val);
  if(idx>=0) MC[key].splice(idx,1);
  else MC[key].push(val);
  renderConstructor();
}
function removeMC(key, val){
  if(!MC[key]) return;
  MC[key]=MC[key].filter(function(x){return x!==val;});
  renderConstructor();
}

function setMC(key, val){
  MC[key]=val;
  renderConstructor();
}

function clearMC(key){
  MC[key]='';
  renderConstructor();
}

// ===== SHOP =====
function rShop(){
  var el=document.getElementById('p-shop');
  var deleted=ST.shopDeleted||[];
  var allGroups=SHOP.map(function(g){
    var extra=(ST.shopExtra&&ST.shopExtra[g.group])||[];
    var base=g.items.filter(function(i){return deleted.indexOf(i.id)<0;});
    return {group:g.group,items:base.concat(extra)};
  }).concat(ST.shopCustom||[]);
  var total=0,done=0;
  for(var i=0;i<allGroups.length;i++){
    for(var j=0;j<allGroups[i].items.length;j++){
      total++;
      if(ST.shopCh[allGroups[i].items[j].id]) done++;
    }
  }
  var pct=total>0?Math.round(done/total*100):0;
  var h='<div class="shop-header">';
  h+='<div class="people-row"><span class="people-label">Количество человек</span>';
  h+='<div class="people-ctrl"><button class="people-btn" onclick="chP(-1)">&#8722;</button>';
  h+='<span class="people-count">'+ST.people+'</span>';
  h+='<button class="people-btn" onclick="chP(1)">+</button></div></div>';
  h+='<div class="progress-text"><span>Куплено</span><span>'+done+' / '+total+'</span></div>';
  h+='<div class="progress-bar-wrap"><div class="progress-bar" style="width:'+pct+'%"></div></div></div>';
  for(var gi=0;gi<allGroups.length;gi++){
    var g=allGroups[gi];
    var isCustom=gi>=SHOP.length;
    h+='<div class="check-group"><div class="check-group-title">'+g.group;
    if(isCustom) h+=' <span class="delete-item" onclick="delShopGroup('+gi+')">&#215;</span>';
    h+='</div>';
    for(var ii=0;ii<g.items.length;ii++){
      var item=g.items[ii];
      var chk=!!ST.shopCh[item.id];
      var qty=ST.shopQ[item.id]||(item.pp>0?(Math.round(item.pp*ST.people*10)/10)+' '+item.unit:item.qty);
      h+='<div class="check-item'+(chk?' done':'')+'" onclick="togS(\''+item.id+'\',this)">';
      h+='<div class="check-box'+(chk?' checked':'')+'"></div>';
      h+='<span class="check-text">'+item.name+'</span>';
      h+='<input class="check-qty-input" type="text" value="'+qty+'" onclick="event.stopPropagation()" onchange="updQ(this.dataset.id,this.value)" data-id="'+item.id+'">';
      h+='<span class="delete-item" onclick="event.stopPropagation();delShopAny(\'' +item.id+'\','+gi+','+ii+')">&#215;</span>';
      h+='</div>';
    }
    // Add item button for ALL groups
    h+='<div class="add-item-btn" onclick="showAddShopItem('+gi+')">+ Добавить позицию</div>';
    h+='<div class="add-item-input" id="addSI-'+gi+'">';
    h+='<input type="text" id="addSN-'+gi+'" placeholder="Название..."><button onclick="addShopItem('+gi+')">OK</button></div>';
    h+='</div>';
  }
  h+='<button class="reset-btn" style="margin-bottom:4px" onclick="rstS()">Сбросить все отметки</button>';
  h+='<div class="check-group" style="margin-top:4px"><div class="add-item-btn" onclick="showAddGroupInput()">+ Добавить свою группу</div><div class="add-item-input" id="addGroupInput"><input type="text" id="addGroupName" placeholder="Название группы..."><button onclick="addShopGroup()">OK</button></div></div>';
  el.innerHTML=h;
}
function chP(d){ST.people=Math.max(1,Math.min(10,ST.people+d));save();rShop();}
function togS(id,el){
  ST.shopCh[id]=!ST.shopCh[id];save();
  el.classList.toggle('done');
  el.querySelector('.check-box').classList.toggle('checked');
  var deleted=ST.shopDeleted||[];
  var allGroups=SHOP.map(function(g){
    var extra=(ST.shopExtra&&ST.shopExtra[g.group])||[];
    var base=g.items.filter(function(i){return deleted.indexOf(i.id)<0;});
    return {group:g.group,items:base.concat(extra)};
  }).concat(ST.shopCustom||[]);
  var t=0,d=0;
  for(var i=0;i<allGroups.length;i++) for(var j=0;j<allGroups[i].items.length;j++){t++;if(ST.shopCh[allGroups[i].items[j].id])d++;}
  document.querySelector('.progress-bar').style.width=Math.round(d/t*100)+'%';
  document.querySelector('.progress-text span:last-child').textContent=d+' / '+t;
}
function updQ(id,v){ST.shopQ[id]=v;save();}
function rstS(){confirmAction('Сбросить все отметки?','Сбросить',function(){ST.shopCh={};save();rShop();});}
function showAddGroupInput(){
  document.getElementById('addGroupInput').classList.add('show');
  document.getElementById('addGroupName').focus();
}
function addShopGroup(){
  var inp=document.getElementById('addGroupName');
  var name=inp?inp.value.trim():'';
  if(!name) return;
  if(!ST.shopCustom) ST.shopCustom=[];
  ST.shopCustom.push({group:name,items:[]});
  save();rShop();
}
function delShopGroup(gi){
  var idx=gi-SHOP.length;
  if(!ST.shopCustom||idx<0) return;
  ST.shopCustom.splice(idx,1);save();rShop();
}
function showAddShopItem(gi){
  document.getElementById('addSI-'+gi).classList.add('show');
  document.getElementById('addSN-'+gi).focus();
}
function addShopItem(gi){
  var name=document.getElementById('addSN-'+gi).value.trim();
  if(!name) return;
  var id='u'+Date.now();
  var item={id:id,name:name,qty:'1 шт',pp:0,unit:'шт'};
  var customIdx=gi-SHOP.length;
  if(customIdx>=0){
    // Custom group
    if(!ST.shopCustom) ST.shopCustom=[];
    ST.shopCustom[customIdx].items.push(item);
  } else {
    // Built-in group - add to extra items
    if(!ST.shopExtra) ST.shopExtra={};
    var gName=SHOP[gi].group;
    if(!ST.shopExtra[gName]) ST.shopExtra[gName]=[];
    ST.shopExtra[gName].push(item);
    // Also mark as deletable
    if(!ST.shopExtra) ST.shopExtra={};
    ST.shopExtra[id]=true;
  }
  save();rShop();
}
function delShopAny(itemId, gi, ii){
  if(!ST.shopDeleted) ST.shopDeleted=[];
  var customIdx=gi-SHOP.length;
  if(customIdx>=0 && ST.shopCustom && ST.shopCustom[customIdx]){
    // Custom group item
    ST.shopCustom[customIdx].items.splice(ii,1);
  } else if(itemId.indexOf('u')===0){
    // Extra item added to built-in group - find and remove from shopExtra
    if(ST.shopExtra){
      var gName=gi<SHOP.length?SHOP[gi].group:'';
      if(gName && ST.shopExtra[gName]){
        ST.shopExtra[gName]=ST.shopExtra[gName].filter(function(x){return x.id!==itemId;});
      }
    }
  } else {
    // Base built-in item - hide it
    if(ST.shopDeleted.indexOf(itemId)<0) ST.shopDeleted.push(itemId);
  }
  save();rShop();
}
function delShopItem(gi,ii){
  var idx=gi-SHOP.length;
  if(!ST.shopCustom||idx<0) return;
  ST.shopCustom[idx].items.splice(ii,1);save();rShop();
}

function rPantry(){
  var el=document.getElementById('p-pantry');

    {key:'dishes',label:'Готовые блюда',isObj:true},
    {key:'breakfasts',label:'Завтраки',isObj:true},

    {key:'starters',label:'Закуски',isObj:false},

    {key:'drinks',label:'Напитки (безалко)',isObj:false},

      var item=items[i];

      var tm=typeof item==='object'&&item.time?' <span style="color:#aaa;font-size:11px">~'+item.time+' мин</span>':'';
      h+='<div class="check-item" style="cursor:default">';
      h+='<span class="check-text">'+nm+tm+'</span>';
      h+='<span class="delete-item pc-del" data-key="'+sec.key+'" data-id="'+itemId+'" data-idx="'+i+'">&#215;</span>';
      h+='</div>';
    }
    // Show hidden items count with restore option
    var hiddenCount=0;
    for(var i=0;i<items.length;i++){
      var item=items[i];
      var itemId=typeof item==='object'?item.id:(sec.key+'_'+i);
      if(del[itemId]) hiddenCount++;
    }
    if(hiddenCount>0){
      h+='<div class="add-item-btn pc-restore" data-key="'+sec.key+'" style="color:#aaa;font-size:12px">&#8635; Восстановить скрытые ('+hiddenCount+')</div>';

    h+='<button class="pc-save" data-key="'+sec.key+'">OK</button>';
    h+='</div>';
  }
  el.innerHTML=h;
}

function addPantryItem(key){
  var inp=document.getElementById('addPT-'+key);

  var tInp=document.getElementById('addPTime-'+key);
  var t=tInp?parseInt(tInp.value)||0:0;
  var objKeys=['dishes','breakfasts'];
  var item=(objKeys.indexOf(key)>=0)?{id:'u'+Date.now(),name:v,time:t}:v;

  rPantry();
}

function restorePantry(key){
  if(!ST.pantryDeleted) return;
  var items=PANTRY[key]||[];
  for(var i=0;i<items.length;i++){
    var item=items[i];
    var itemId=typeof item==='object'?item.id:(key+'_'+i);
    delete ST.pantryDeleted[itemId];
  }
  save();
  rPantry();
}

function computeExpenseSummary(){
  var total=0;
  var names=getTripMemberNames();
  var paidByPerson={};
  var owedByPerson={};
  for(var i=0;i<names.length;i++){
    paidByPerson[names[i]]=0;
    owedByPerson[names[i]]=0;
  }
  for(var i=0;i<ST.expenses.length;i++){
    var e=ST.expenses[i]||{};
    var amount=parseFloat(e.amount)||0;
    total+=amount;
    if(e.paidBy){
      if(paidByPerson[e.paidBy]===undefined) paidByPerson[e.paidBy]=0;
      paidByPerson[e.paidBy]+=amount;
    }
    var participants=(e.participantNames&&e.participantNames.length)?e.participantNames.slice():names.slice();
    if(!participants.length) participants=names.slice();
    var share=participants.length ? amount/participants.length : 0;
    for(var j=0;j<participants.length;j++){
      var pname=participants[j];
      if(owedByPerson[pname]===undefined) owedByPerson[pname]=0;
      owedByPerson[pname]+=share;
    }
  }
  var settledOut={};
  var settledIn={};
  var settlementsList=Array.isArray(ST.settlements)?ST.settlements:[];
  for(var si=0;si<settlementsList.length;si++){
    var s=settlementsList[si]||{};
    var sa=parseFloat(s.amount)||0;
    if(!sa) continue;
    if(s.fromName){ if(settledOut[s.fromName]===undefined) settledOut[s.fromName]=0; settledOut[s.fromName]+=sa; }
    if(s.toName){ if(settledIn[s.toName]===undefined) settledIn[s.toName]=0; settledIn[s.toName]+=sa; }
  }
  var summaryNames={};
  Object.keys(paidByPerson).forEach(function(k){summaryNames[k]=1;});
  Object.keys(owedByPerson).forEach(function(k){summaryNames[k]=1;});
  Object.keys(settledOut).forEach(function(k){summaryNames[k]=1;});
  Object.keys(settledIn).forEach(function(k){summaryNames[k]=1;});
  var rows=[];
  Object.keys(summaryNames).sort(function(a,b){return a.localeCompare(b,'ru');}).forEach(function(name){
    var diff=(paidByPerson[name]||0)-(owedByPerson[name]||0);
    var out=settledOut[name]||0;
    var inn=settledIn[name]||0;
    rows.push({
      name:name,
      paid:paidByPerson[name]||0,
      owed:owedByPerson[name]||0,
      diff:diff,
      settledOut:out,
      settledIn:inn,
      netDiff:diff + out - inn
    });
  });
  var avgShare=rows.length ? rows.reduce(function(s,r){return s+r.owed;},0)/rows.length : 0;

  var creditors=[];
  var debtors=[];
  var eps=0.01;
  for(var k=0;k<rows.length;k++){
    var diffNet=rows[k].netDiff;
    if(diffNet>eps) creditors.push({name:rows[k].name, amount:diffNet});
    else if(diffNet<-eps) debtors.push({name:rows[k].name, amount:Math.abs(diffNet)});
  }
  creditors.sort(function(a,b){return b.amount-a.amount;});
  debtors.sort(function(a,b){return b.amount-a.amount;});
  var suggestedTransfers=[];
  var ci=0, di=0;
  while(ci<creditors.length && di<debtors.length){
    var c=creditors[ci], d=debtors[di];
    var pay=Math.min(c.amount,d.amount);
    if(pay>eps){
      suggestedTransfers.push({from:d.name,to:c.name,amount:pay});
      c.amount-=pay;
      d.amount-=pay;
    }
    if(c.amount<=eps) ci++;
    if(d.amount<=eps) di++;
  }
  return {total:total, rows:rows, avgShare:avgShare, suggestedTransfers:suggestedTransfers};
}

function saveExp(){
  var desc=document.getElementById('expDesc').value.trim();
  var amt=parseFloat(document.getElementById('expAmt').value)||0;
  var who=getExpenseWhoValue();
  var cat=document.getElementById('expCat').value;
  var sel=document.getElementById('expWhoSelect');
  var selectedParticipants=getSelectedExpenseParticipants();
  if(!desc||!amt||!who){showToast('Заполни все поля',true);return;}
  var afterMemberReady = function(member){
    var whoName = member && member.displayName ? member.displayName : who;
    var participantNames=selectedParticipants.slice();
    if(participantNames.indexOf(whoName)===-1) participantNames.push(whoName);
    if(!participantNames.length){showToast('Выбери хотя бы одного участника',true);return;}
    var participantMemberIds=[];
    for(var i=0;i<participantNames.length;i++){
      var found=findMemberByName(participantNames[i]);
      if(found&&found._id) participantMemberIds.push(found._id);
    }
    if(!ST.expenses) ST.expenses=[];
    var base=(expEditIndex>=0 && ST.expenses[expEditIndex]) ? ST.expenses[expEditIndex] : {};
    var entry={desc:desc,amount:amt,paidBy:whoName,paidByMemberId:(member&&member._id)||null,participantNames:participantNames,participantMemberIds:participantMemberIds,cat:cat,date:base.date||new Date().toISOString().split('T')[0],createdAt:base.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};
    if(base._id) entry._id=base._id;
    if(expEditIndex>=0){
      ST.expenses[expEditIndex]=entry;
      save();
      if(entry._id) updateExpenseInFirebase(entry._id, entry);
      else addExpenseToFirebase(entry);
    } else {
      ST.expenses.push(entry);
      save();
      addExpenseToFirebase(entry);
    }
    cancelExpEdit();
    rExpenses();
  };
  if(sel && sel.value==='__manual__'){
    addManualMemberToFirebase(who).then(function(member){
      afterMemberReady(member || {displayName:who,_id:null});
    });
  }else{
    afterMemberReady(findMemberByName(who));
  }
}

// ===== RECIPES =====
function rRecipes(){
  var el=document.getElementById('p-recipes');
  function RC(name,sub,body){
    return '<div class="card" onclick="toggle(this)"><div class="card-hd"><div><div class="card-title">'+name+'</div>'+(sub?'<div class="card-sub">'+sub+'</div>':'')+'</div><span class="card-arrow">&#9660;</span></div><div class="card-body">'+body+'</div></div>';
  }
  function ING(rows){
    var h='';
    for(var i=0;i<rows.length;i++) h+='<div class="row"><span>'+rows[i][0]+'</span><span class="row-val">'+rows[i][1]+'</span></div>';
    return h;
  }
  function M(t){return '<div class="method">'+t+'</div>';}
  var h='<div class="sec-h">Из рыбы</div>';
  h+=RC('Малосольная сима','8-12 ч без огня',ING([['Филе','800 г'],['Соль крупная','2 ст.л.'],['Сахар','1 ст.л.'],['Перец + укроп','по вкусу']])+M('Не мыть — обсушить. Натереть смесью, в пакет, под гнёт в тень/реку на 8-12 ч. Нарезать тонко поперёк волокна. Подать с: джин-тоник.'));
  h+=RC('Икра пятиминутка','5 мин',M('Освободить от плёнок. Залить рассолом (1 ст.л. соли на стакан воды) на 5-7 мин. Слить, промыть. На хлеб с маслом.'));
  h+=RC('Риет из симы','Лучший завтрак',ING([['Филе варёное','400 г'],['Сливочное масло','80-100 г'],['Каперсы','1 ст.л.'],['Лимон, соль, перец','по вкусу']])+M('Горячую рыбу разобрать на волокна. Масло тает — мешать вилкой. Каперсы, лимон. Утрамбовать, в реку на 2+ ч. Подать с: Bee\'s Knees.'));
  h+=RC('Рыба бабочкой на костре','',M('Выпотрошить, раскрыть бабочкой. Посолить, натереть чесноком. Зафиксировать прутьями. Над углями (не огнём) 25-30 мин. Подать с: Негрони.'));
  h+=RC('Уха рыбацкая','С традицией',M('Головы+хвосты варить 20 мин. Процедить. Картошка + куски филе + лавровый лист — 7-10 мин. Традиция: 50 мл водки и горящая веточка в котелок.'));
  h+=RC('Пельмени из симы на сочнях','',M('Свежее филе порубить кусочками 3-5 мм (не фарш!). Лук, соль, перец. На сочень — начинку, залепить. Варить 7-8 мин после всплытия.'));
  h+=RC('Хе из симы','Корейское, острое',ING([['Филе кубиками','400 г'],['Уксус / лимон','3 ст.л.'],['Соевый соус','2 ст.л.'],['Чеснок, хлопья перца','по вкусу']])+M('Смешать, мариновать 30 мин — рыба побелеет. Подать с: Jager тоник.'));
  h+=RC('Сугудай','Мягче хе',M('Рыба кубиками + лук + соль + перец + уксус + масло. Перемешать, 15-20 мин.'));
  h+=RC('Сашими','Только свежепойманная',M('Поперёк волокна под 45°, ломти ~5 мм. Соевый + васаби + имбирь. Подать с: French 75.'));
  h+='<div class="sec-h">Деликатесы Сахалина</div>';
  h+=RC('Устрицы на костре с сыром','',M('На решётку выпуклой стороной вниз. Когда откроются (~7 мин) — снять крышку. Масло + тёртый сыр. Ещё 2 мин. Лимон. Подать с: French 75.'));
  h+=RC('Гребешок на сковороде','2 минуты',M('Сковорода очень горячая. Масло. 1-1.5 мин с каждой стороны. Соль, перец, масло + чеснок. Внутри должен быть нежным! Подать с: белое сухое.'));
  h+=RC('Краб варёный','',M('Кипящая солёная вода. Варить 15-20 мин. Разломить, обмакнуть в растопленное масло. Подать с: белое сухое или Spritz.'));
  h+=RC('Морской ёж','Деликатес прямо из воды',M('Разрезать ножницами по экватору. Достать оранжевые языки. Съесть так или с соевым. Подать с: брют — обязательно.'));
  h+=RC('Мидии на костре','Открываются сами',M('На решётку над углями. Когда раковины откроются — готово. Не открылись — выбросить. Лимон + соевый.'));
  h+='<div class="sec-h">Паста</div>';
  h+=RC('Карбонара из симы','Вместо гуанчиале — буженина',ING([['Спагетти','300 г'],['Желтки','4 шт'],['Пармезан','80 г'],['Буженина кубиками','150 г'],['Чёрный перец (много!)','по вкусу']])+M('Сварить пасту. Обжарить буженину. Желтки + сыр + перец смешать. Горячую пасту снять с огня, влить смесь, быстро перемешать. НЕ ставить на огонь!'));
  h+=RC('Феттучини с симой','',ING([['Паста','300 г'],['Филе симы','300 г'],['Сливки','150 мл'],['Чеснок, лимон, укроп','по вкусу']])+M('Рыбу обжарить 2-3 мин. Сливки + чеснок, тушить 3-4 мин. Смешать с пастой. Подать с: Wine Spritzer.'));
  h+='<div class="sec-h">Яйца</div>';
  h+=RC('Яйца пашот','Основа главного блюда',M('Воду почти до кипения + уксус (2 ст.л./л). Яйцо разбить в кружку, плавно опустить. Огонь минимальный. 3-3.5 мин. На хлеб: гравлакс → пашот → голландский → икра → перец.'));
  h+=RC('Голландский соус','Слабый огонь!',ING([['Сливочное масло','150 г'],['Желтки','4 шт'],['Лимонный сок','2 ст.л.']])+M('Масло растопить, не кипятить. Желтки + лимон взбить. Кружку над паром. Тонкой струйкой масло — постоянно мешать.'));
  h+=RC('Шакшука','',M('Лук + чеснок обжарить. Томатная паста + вода + паприка + тмин, 5 мин. Углубления → вбить яйца. Накрыть, 4-5 мин.'));
  h+='<div class="sec-h">Кофе</div>';
  h+=RC('Бамбл би','Если есть лёд',ING([['Дрип крепкий','150 мл'],['Мёд','1 ст.л.'],['Лимонный сок','30 мл'],['Лёд','полный стакан']])+M('Мёд растворить в кофе. Стакан с льдом. Лимонный сок слоем, затем кофе с мёдом.'));
  h+=RC('Раф с халвой','Если холодно',ING([['Дрип крепкий','100 мл'],['Сливки / сгуха','80 мл'],['Халва','1-2 ст.л.']])+M('Растворить халву в горячем кофе. Добавить сливки. Взболтать.'));
  h+=RC('Кофейный негрони (эксперимент)','Кампари вместо воды в дрип',ING([['Кампари нагреть до ~70','через дрип'],['Джин','30 мл'],['Вермут красный','30 мл']])+M('Нагреть Кампари, не кипятить. Пролить через дрип медленно. Смешать с джином и вермутом.'));
  h+='<div class="sec-h">Базовое</div>';
  h+=RC('Рич сироп (2:1)','Основа коктейлей',M('2 части сахара + 1 часть горячей воды. Мешать до растворения. Остудить. Хранится несколько дней.'));
  el.innerHTML=h;
}

      CC('Kir Royale','Французский аперитив','easy',[['Брют холодный','120 мл'],['Варенье / сироп','15 мл']],'Варенье на дно, долить брютом. Не мешать.'),

function setBF(f){bF=f;rBar();}


function showAddPoint(id){
  document.getElementById('addPtForm').classList.add('show');
  document.getElementById('ptName').focus();
}
function addRiverPoint(id){
  var name=document.getElementById('ptName').value.trim();
  if(!name){showToast('Введи название точки',true);return;}
  var coords=document.getElementById('ptCoords').value.trim();
  var note=document.getElementById('ptNote').value.trim();
  var lat=null,lon=null;
  if(coords){
    var parts=coords.split(',');
    if(parts.length===2){lat=parseFloat(parts[0].trim());lon=parseFloat(parts[1].trim());}
  }
  if(!ST.riverPoints) ST.riverPoints={};
  if(!ST.riverPoints[id]) ST.riverPoints[id]=[];
  ST.riverPoints[id].push({name:name,note:note,lat:lat,lon:lon});
  save();
  showRiver(id);
}
function delRiverPoint(id,idx){
  if(!ST.riverPoints||!ST.riverPoints[id]) return;
  ST.riverPoints[id].splice(idx,1);
  save();
  showRiver(id);
}


function showAddGearCommon(gi){
  document.getElementById('addGC-'+gi).classList.add('show');
  document.getElementById('addGCT-'+gi).focus();
}
function addGearCommon(gi){
  var v=document.getElementById('addGCT-'+gi).value.trim();
  if(!v) return;
  if(!ST.gearCommonExtra) ST.gearCommonExtra={};
  if(!ST.gearCommonExtra[gi]) ST.gearCommonExtra[gi]=[];
  ST.gearCommonExtra[gi].push(v);
  save();rGear();setGT('common');
}
function delGearCommon(idx){
  if(!ST.gearCommonDel) ST.gearCommonDel=[];
  if(ST.gearCommonDel.indexOf(idx)<0) ST.gearCommonDel.push(idx);
  save();rGear();setGT('common');
}
function delGearCommonExtra(gi,idx){
  if(!ST.gearCommonExtra||!ST.gearCommonExtra[gi]) return;
  ST.gearCommonExtra[gi].splice(idx,1);
  save();rGear();setGT('common');
}
function togGCE(gi,idx,el){
  var key='ec'+gi+'_'+idx;
  if(!ST.gearCC) ST.gearCC={};
  ST.gearCC[key]=!ST.gearCC[key];
  el.classList.toggle('done');
  el.querySelector('.check-box').classList.toggle('checked');
  save();
}
function delGearPersonalBase(idx){
  if(!ST.gearPersonalDel) ST.gearPersonalDel=[];
  if(ST.gearPersonalDel.indexOf(idx)<0) ST.gearPersonalDel.push(idx);
  save();rGear();setGT('personal');
}

render('route');
